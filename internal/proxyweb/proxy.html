<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #333;
            padding: 24px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        input {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            min-width: 260px;
            outline: none;
        }
        input:focus { border-color: #999; }
        button {
            padding: 6px 14px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }
        button:hover { background: #f4f4f4; }
        .hint { margin-top: 10px; font-size: 12px; color: #999; }
        .err { margin-top: 10px; font-size: 13px; color: #c00; display: none; }
    </style>
</head>
<body>
    <label for="target">Target URL</label>
    <div class="form-row">
        <input type="text" id="target" placeholder="localhost:3000" autofocus
               onkeydown="if(event.key==='Enter')go()">
        <button onclick="go()">Go</button>
    </div>
    <div class="hint">e.g. <code>localhost:3000</code>, <code>192.168.1.50:8080</code>.</div>
    <div class="err" id="err"></div>
    <script>
        // Ask bootstrap.js (the top frame) to navigate to /<target>/.
        // The iframe sandbox forbids top-frame navigation directly,
        // and bootstrap.js owns the secret access code anyway — same
        // pattern the cap-bar uses, just with newTab:false so this
        // tab becomes the target tab in-place.
        function go() {
            const errEl = document.getElementById('err');
            errEl.style.display = 'none';
            let target = document.getElementById('target').value.trim();
            if (!target) return;
            target = target.replace(/^https?:\/\//, '').replace(/\/+$/, '');
            // The host segment must be parseable by the listener's
            // proxy heuristic (contain ':' or '.', or equal 'localhost').
            if (!/[:.]/.test(target) && target !== 'localhost') {
                errEl.textContent = 'Target must look like a host: hostname:port, IP, or localhost.';
                errEl.style.display = 'block';
                return;
            }
            parent.postMessage({type:'bb-open-cap', path:'/' + target + '/', newTab:false}, '*');
        }
    </script>
</body>
</html>
