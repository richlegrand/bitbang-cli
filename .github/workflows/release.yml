name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
          - arch: armv7
            goarch: arm
            goarm: "7"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o bitbang-linux-${{ matrix.arch }} ./cmd/bitbang/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: bitbang-linux-${{ matrix.arch }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: bitbang-linux-${{ matrix.arch }}

  # Aggregates SHA-256 sums of every uploaded binary into a single
  # checksums.txt and attaches it to the release. install.sh fetches this
  # file to verify the downloaded binary; absence is treated as "release
  # predates the convention" and the install proceeds with a warning.
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir release
          gh release download "${{ github.event.release.tag_name }}" \
              --repo "${{ github.repository }}" \
              --pattern 'bitbang-linux-*' \
              --dir release

      - name: Generate checksums
        working-directory: release
        run: sha256sum bitbang-linux-* > checksums.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/checksums.txt
